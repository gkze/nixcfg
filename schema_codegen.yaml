# Declarative JSON Schema -> Python model generation targets.
---
defaults:
  generator:
    input_file_type: jsonschema
    output_model_type: pydantic_v2.BaseModel
    target_python_version: "3.14"
    use_annotated: true
    use_union_operator: true
    use_standard_collections: true
    use_exact_imports: true
    field_constraints: true
    snake_case_field: true
    capitalise_enum_members: true
    use_schema_description: true
    use_field_description: true
    formatters:
      - ruff-format
      - ruff-check
sources:
  github-workflow-schema:
    kind: url
    uri: https://json.schemastore.org/github-workflow.json
    format: json
  codegen-manifest-schemas:
    kind: directory
    path: schemas/codegen
    include:
      - "*.json"
    format: json
# Nix's vendored JSON schemas are intentionally generated through
# nixcfg schema codegen / lib.nix.schemas._codegen; keep this declarative
# config focused on the schema_codegen and GitHub Actions generated models.
registry_profiles:
  autodetect:
    resource:
      mode: from-contents
    aliases:
      - source-uri
      - internal-id
    registry:
      crawl: true
      retrieve:
        kind: none
  local-relative:
    resource:
      mode: from-contents
    aliases:
      - relative-path
      - basename
      - internal-id
    registry:
      crawl: true
      retrieve:
        kind: none
targets:
  codegen-manifest-models:
    sources:
      - codegen-manifest-schemas
    registry_profile: local-relative
    entrypoints:
      - ./codegen.schema.json
      - ./codegen-lock.schema.json
    prepare:
      dereference: inline-refs
      merge_ref_siblings: false
    generator:
      output: lib/schema_codegen/models/_generated.py
  github-actions:
    sources:
      - github-workflow-schema
    registry_profile: autodetect
    entrypoints:
      - https://json.schemastore.org/github-workflow.json
    prepare:
      dereference: none
      merge_ref_siblings: false
    generator:
      output: lib/github_actions/models/_generated.py
      class_name: GitHubWorkflow
      reuse_model: true
      collapse_reuse_models: true
      use_type_alias: true
