---
name: CI
on:
  pull_request:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
env:
  CACHIX_NAME: gkze
permissions:
  contents: read
jobs:
  commitlint:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - &checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - &setup_nix
        # Determinate Nix v3.17.1
        uses: DeterminateSystems/determinate-nix-action@a18f73c54ca8525de051e73c31512a67f44df919
        with:
          extra-conf: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
      - &cachix_write
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          # Push store paths incrementally as Nix finishes each build and pull
          # from the public zed cache alongside our own cache.
          name: ${{ env.CACHIX_NAME }}
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: zed
          useDaemon: true
      - &cachix_readonly
        if: github.ref != format('refs/heads/{0}', github.event.repository.default_branch)
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: ${{ env.CACHIX_NAME }}
          extraPullNames: zed
          skipPush: true
      - &cache_nix
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          # Cache immutable tarball fetch artifacts only. Nix recreates
          # mutable SQLite metadata caches locally, and persisting them via
          # archive-based CI caches can restore malformed databases.
          path: |
            ~/.cache/nix/tarball-cache
            ~/.cache/nix/tarball-cache-v2
          # yamllint disable rule:line-length
          key: >-
            nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles( 'flake.lock', 'packages/**/sources.json',
            'overlays/**/sources.json', 'packages/**/Cargo.nix', 'packages/**/crate-hashes.json', 'overlays/**/Cargo.nix',
            'overlays/**/crate-hashes.json', 'packages/superset/bun.nix', 'packages/superset/bun.lock'
            ) }}
          # yamllint enable rule:line-length
          restore-keys: |
            nix-cache-${{ runner.os }}-${{ runner.arch }}-
            nix-cache-${{ runner.os }}-
      - name: Lint commit messages
        run: |-
          case "${{ github.event_name }}" in
            pull_request)
              FROM="${{ github.event.pull_request.base.sha }}"
              TO="${{ github.event.pull_request.head.sha }}"
              ;;
            push)
              FROM="${{ github.event.before }}"
              TO="${{ github.sha }}"
              ;;
            *)
              FROM=""
              TO="${{ github.sha }}"
              ;;
          esac

          if [ -n "$FROM" ] && [ "$FROM" != "0000000000000000000000000000000000000000" ]; then
            nix run --inputs-from . nixpkgs#commitlint -- \
              --from "$FROM" \
              --to "$TO" \
              --verbose
          else
            nix run --inputs-from . nixpkgs#commitlint -- \
              --last \
              --verbose
          fi
  quality:
    strategy:
      fail-fast: false
      matrix:
        check:
          - format-repo
          - lint-editorconfig
          - format-yaml-yamlfmt
          - lint-yaml-yamllint
          - format-web-biome
          - format-python-ruff
          - lint-python-ruff
          - lint-python-ty
          - lint-workflows-actionlint
          - test-python-pytest
          - verify-workflow-artifacts-refresh
          - verify-workflow-artifacts-certify
          - verify-workflow-structure-refresh
          - verify-workflow-structure-certify
    name: ${{ matrix.check }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - *checkout
      - *setup_nix
      - *cachix_write
      - *cachix_readonly
      - *cache_nix
      - name: Run quality gate
        run: nix build .#checks.x86_64-linux.${{ matrix.check }}
  # ghawfr coverage is intentionally omitted from GitHub Actions for now.
  # The in-repo workflow runner still depends on host/runtime assumptions that
  # are not stable in generic CI; keep local `go test ./...` coverage until a
  # dedicated CI-parity job is ready.
  lint-pins-pinact:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - *checkout
      - *setup_nix
      - *cachix_write
      - *cachix_readonly
      - *cache_nix
      - name: Verify pinned action annotations with pinact
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: nix run --inputs-from . nixpkgs#pinact -- run --check
  verify-crate2nix:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - *checkout
      - *setup_nix
      - *cachix_write
      - *cachix_readonly
      - *cache_nix
      - name: Verify crate2nix artifacts are fresh
        run: nix run .#nixcfg -- ci pipeline crate2nix
