---
name: CI
on:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  commitlint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/determinate-nix-action@v3
      - name: Lint commit messages
        run: |-
          case "${{ github.event_name }}" in
            pull_request)
              FROM="${{ github.event.pull_request.base.sha }}"
              TO="${{ github.event.pull_request.head.sha }}"
              ;;
            push)
              FROM="${{ github.event.before }}"
              TO="${{ github.sha }}"
              ;;
            *)
              FROM=""
              TO="${{ github.sha }}"
              ;;
          esac

          if [ -n "$FROM" ] && [ "$FROM" != "0000000000000000000000000000000000000000" ]; then
            nix develop --command commitlint \
              --from "$FROM" \
              --to "$TO"
          else
            nix develop --command commitlint --last --verbose
          fi
  quality:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: format
            command: nix fmt -- --ci
          - name: editorconfig
            command: editorconfig-checker
          - name: python
            command: uv run ruff check --config pyproject.toml . && uv run ty check .
          - name: pytest
            command: uv sync --frozen --group dev && uv run coverage run -m pytest && uv run coverage report
          - name: crate2nix
            command: uv run python -m lib.update.ci.crate2nix
          - name: actionlint
            command: actionlint
          - name: yamllint
            command: |
              mapfile -d '' -t files < <(git ls-files -z -- '*.yml' '*.yaml')
              if [ "${#files[@]}" -gt 0 ]; then
                yamllint -c .yamllint "${files[@]}"
              fi
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
      - name: Run quality gate
        env:
          QUALITY_COMMAND: ${{ matrix.command }}
        run: nix develop --command bash -lc "$QUALITY_COMMAND"
