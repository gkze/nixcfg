---
name: CI
on:
  pull_request:
  push:
    branches:
      - main
env:
  CACHIX_NAME: gkze
permissions:
  contents: read
jobs:
  commitlint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/determinate-nix-action@v3
      - if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: cachix/cachix-action@v16
        with:
          name: ${{ env.CACHIX_NAME }}
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - if: github.ref != format('refs/heads/{0}', github.event.repository.default_branch)
        uses: cachix/cachix-action@v16
        with:
          name: ${{ env.CACHIX_NAME }}
          skipPush: true
      - uses: actions/cache@v5
        with:
          # Cache immutable tarball fetch artifacts only. Nix recreates
          # mutable SQLite metadata caches locally, and persisting them via
          # archive-based CI caches can restore malformed databases.
          path: |
            ~/.cache/nix/tarball-cache
            ~/.cache/nix/tarball-cache-v2
          key: nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'packages/**/sources.json', 'overlays/**/sources.json', 'packages/**/Cargo.nix', 'packages/**/crate-hashes.json', 'overlays/**/Cargo.nix', 'overlays/**/crate-hashes.json', 'packages/superset/bun.nix') }}
          restore-keys: |
            nix-cache-${{ runner.os }}-${{ runner.arch }}-
            nix-cache-${{ runner.os }}-
      - name: Lint commit messages
        run: |-
          case "${{ github.event_name }}" in
            pull_request)
              FROM="${{ github.event.pull_request.base.sha }}"
              TO="${{ github.event.pull_request.head.sha }}"
              ;;
            push)
              FROM="${{ github.event.before }}"
              TO="${{ github.sha }}"
              ;;
            *)
              FROM=""
              TO="${{ github.sha }}"
              ;;
          esac

          if [ -n "$FROM" ] && [ "$FROM" != "0000000000000000000000000000000000000000" ]; then
            nix run --inputs-from . nixpkgs#commitlint -- \
              --from "$FROM" \
              --to "$TO" \
              --verbose
          else
            nix run --inputs-from . nixpkgs#commitlint -- \
              --last \
              --verbose
          fi
  quality:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: format
            command: nix fmt -- --ci
          - name: editorconfig
            command: nix run --inputs-from . nixpkgs#editorconfig-checker
          - name: python
            command: uv run ruff check --config pyproject.toml . && uv run ty check .
          - name: pytest
            command: uv sync --frozen --group dev && uv run coverage run -m pytest && uv run coverage report
          - name: crate2nix
            command: uv run python -m lib.update.ci.crate2nix
          - name: workflow-artifacts
            command: uv run nixcfg ci workflow verify-artifacts
          - name: actionlint
            command: nix run --inputs-from . nixpkgs#actionlint
          - name: yamllint
            command: |
              mapfile -d '' -t files < <(git ls-files -z -- '*.yml' '*.yaml')
              if [ "${#files[@]}" -gt 0 ]; then
                yamllint -c .yamllint "${files[@]}"
              fi
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
      - if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: cachix/cachix-action@v16
        with:
          name: ${{ env.CACHIX_NAME }}
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - if: github.ref != format('refs/heads/{0}', github.event.repository.default_branch)
        uses: cachix/cachix-action@v16
        with:
          name: ${{ env.CACHIX_NAME }}
          skipPush: true
      - uses: actions/cache@v5
        with:
          # Cache immutable tarball fetch artifacts only. Nix recreates
          # mutable SQLite metadata caches locally, and persisting them via
          # archive-based CI caches can restore malformed databases.
          path: |
            ~/.cache/nix/tarball-cache
            ~/.cache/nix/tarball-cache-v2
          key: nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'packages/**/sources.json', 'overlays/**/sources.json', 'packages/**/Cargo.nix', 'packages/**/crate-hashes.json', 'overlays/**/Cargo.nix', 'overlays/**/crate-hashes.json', 'packages/superset/bun.nix') }}
          restore-keys: |
            nix-cache-${{ runner.os }}-${{ runner.arch }}-
            nix-cache-${{ runner.os }}-
      - name: Run quality gate
        env:
          QUALITY_COMMAND: ${{ matrix.command }}
        run: nix develop --command bash -lc "$QUALITY_COMMAND"
