--- # !yamlfmt!:ignore
# Generated by `nixcfg ci workflow generate` -- do not hand-edit.
# Source of truth: lib/update/ci/workflow_defs.py.
name: CI

on:
  # Disabled: keep the workflow valid without automatic or manual triggers.
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CACHIX_NAME: gkze

jobs:
  commitlint:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      # Determinate Nix v3.17.1
      # Nix uses this token for external api.github.com flake fetches.
      # The default github.token produces HTTP 401 "Bad credentials" there.
      - uses: DeterminateSystems/determinate-nix-action@a18f73c54ca8525de051e73c31512a67f44df919
        with:
          github-token: ${{ secrets.UPDATE_SELF_HEAL_GITHUB_TOKEN }}
      # Push store paths incrementally as Nix finishes each build and pull
      # from the public zed cache alongside our own cache.
      - if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: ${{ env.CACHIX_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: zed
          useDaemon: true
      - if: github.ref != format('refs/heads/{0}', github.event.repository.default_branch)
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: ${{ env.CACHIX_NAME }}
          extraPullNames: zed
          skipPush: true
      # Cache immutable tarball fetch artifacts only. Nix recreates
      # mutable SQLite metadata caches locally, and persisting them via
      # archive-based CI caches can restore malformed databases.
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/nix/tarball-cache
            ~/.cache/nix/tarball-cache-v2
          key: >-
            nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles( 'flake.lock',
            'packages/**/sources.json', 'overlays/**/sources.json', 'packages/**/Cargo.nix',
            'packages/**/crate-hashes.json', 'overlays/**/Cargo.nix',
            'overlays/**/crate-hashes.json', 'packages/superset/bun.nix',
            'packages/superset/bun.lock', 'packages/t3code/bun.lock',
            'packages/t3code-desktop/bun.lock' ) }}
          restore-keys: |
            nix-cache-${{ runner.os }}-${{ runner.arch }}-
            nix-cache-${{ runner.os }}-
      - name: Lint commit messages
        run: |-
          case "${{ github.event_name }}" in
            pull_request)
              FROM="${{ github.event.pull_request.base.sha }}"
              TO="${{ github.event.pull_request.head.sha }}"
              ;;
            push)
              FROM="${{ github.event.before }}"
              TO="${{ github.sha }}"
              ;;
            *)
              FROM=""
              TO="${{ github.sha }}"
              ;;
          esac

          if [ -n "$FROM" ] && [ "$FROM" != "0000000000000000000000000000000000000000" ]; then
            nix run --inputs-from . nixpkgs#commitlint -- \
              --from "$FROM" \
              --to "$TO" \
              --verbose
          else
            nix run --inputs-from . nixpkgs#commitlint -- \
              --last \
              --verbose
          fi

  quality:
    name: ${{ matrix.check }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        check:
          - format-repo
          - lint-editorconfig
          - format-yaml-yamlfmt
          - lint-yaml-yamllint
          - format-web-oxfmt
          - lint-web-oxlint
          - format-python-pyupgrade
          - format-python-ruff
          - lint-python-compile
          - lint-python-ruff
          - lint-python-ty
          - lint-workflows-actionlint
          - test-nix-default-api
          - test-nix-package-helpers
          - test-nix-opencode-desktop
          - cache-electron-runtimes
          - test-python-pytest
          - verify-workflow-generated
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      # Determinate Nix v3.17.1
      # Nix uses this token for external api.github.com flake fetches.
      # The default github.token produces HTTP 401 "Bad credentials" there.
      - uses: DeterminateSystems/determinate-nix-action@a18f73c54ca8525de051e73c31512a67f44df919
        with:
          github-token: ${{ secrets.UPDATE_SELF_HEAL_GITHUB_TOKEN }}
      # Push store paths incrementally as Nix finishes each build and pull
      # from the public zed cache alongside our own cache.
      - if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: ${{ env.CACHIX_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: zed
          useDaemon: true
      - if: github.ref != format('refs/heads/{0}', github.event.repository.default_branch)
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: ${{ env.CACHIX_NAME }}
          extraPullNames: zed
          skipPush: true
      # Cache immutable tarball fetch artifacts only. Nix recreates
      # mutable SQLite metadata caches locally, and persisting them via
      # archive-based CI caches can restore malformed databases.
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/nix/tarball-cache
            ~/.cache/nix/tarball-cache-v2
          key: >-
            nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles( 'flake.lock',
            'packages/**/sources.json', 'overlays/**/sources.json', 'packages/**/Cargo.nix',
            'packages/**/crate-hashes.json', 'overlays/**/Cargo.nix',
            'overlays/**/crate-hashes.json', 'packages/superset/bun.nix',
            'packages/superset/bun.lock', 'packages/t3code/bun.lock',
            'packages/t3code-desktop/bun.lock' ) }}
          restore-keys: |
            nix-cache-${{ runner.os }}-${{ runner.arch }}-
            nix-cache-${{ runner.os }}-
      - name: Run quality gate
        run: nix build .#checks.x86_64-linux.${{ matrix.check }}

  lint-pins-pinact:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      # Determinate Nix v3.17.1
      # Nix uses this token for external api.github.com flake fetches.
      # The default github.token produces HTTP 401 "Bad credentials" there.
      - uses: DeterminateSystems/determinate-nix-action@a18f73c54ca8525de051e73c31512a67f44df919
        with:
          github-token: ${{ secrets.UPDATE_SELF_HEAL_GITHUB_TOKEN }}
      # Push store paths incrementally as Nix finishes each build and pull
      # from the public zed cache alongside our own cache.
      - if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: ${{ env.CACHIX_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: zed
          useDaemon: true
      - if: github.ref != format('refs/heads/{0}', github.event.repository.default_branch)
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: ${{ env.CACHIX_NAME }}
          extraPullNames: zed
          skipPush: true
      # Cache immutable tarball fetch artifacts only. Nix recreates
      # mutable SQLite metadata caches locally, and persisting them via
      # archive-based CI caches can restore malformed databases.
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/nix/tarball-cache
            ~/.cache/nix/tarball-cache-v2
          key: >-
            nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles( 'flake.lock',
            'packages/**/sources.json', 'overlays/**/sources.json', 'packages/**/Cargo.nix',
            'packages/**/crate-hashes.json', 'overlays/**/Cargo.nix',
            'overlays/**/crate-hashes.json', 'packages/superset/bun.nix',
            'packages/superset/bun.lock', 'packages/t3code/bun.lock',
            'packages/t3code-desktop/bun.lock' ) }}
          restore-keys: |
            nix-cache-${{ runner.os }}-${{ runner.arch }}-
            nix-cache-${{ runner.os }}-
      - name: Verify pinned action annotations with pinact
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: nix run --inputs-from . nixpkgs#pinact -- run --check

  verify-crate2nix:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      # Determinate Nix v3.17.1
      # Nix uses this token for external api.github.com flake fetches.
      # The default github.token produces HTTP 401 "Bad credentials" there.
      - uses: DeterminateSystems/determinate-nix-action@a18f73c54ca8525de051e73c31512a67f44df919
        with:
          github-token: ${{ secrets.UPDATE_SELF_HEAL_GITHUB_TOKEN }}
      # Push store paths incrementally as Nix finishes each build and pull
      # from the public zed cache alongside our own cache.
      - if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: ${{ env.CACHIX_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: zed
          useDaemon: true
      - if: github.ref != format('refs/heads/{0}', github.event.repository.default_branch)
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: ${{ env.CACHIX_NAME }}
          extraPullNames: zed
          skipPush: true
      # Cache immutable tarball fetch artifacts only. Nix recreates
      # mutable SQLite metadata caches locally, and persisting them via
      # archive-based CI caches can restore malformed databases.
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/nix/tarball-cache
            ~/.cache/nix/tarball-cache-v2
          key: >-
            nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles( 'flake.lock',
            'packages/**/sources.json', 'overlays/**/sources.json', 'packages/**/Cargo.nix',
            'packages/**/crate-hashes.json', 'overlays/**/Cargo.nix',
            'overlays/**/crate-hashes.json', 'packages/superset/bun.nix',
            'packages/superset/bun.lock', 'packages/t3code/bun.lock',
            'packages/t3code-desktop/bun.lock' ) }}
          restore-keys: |
            nix-cache-${{ runner.os }}-${{ runner.arch }}-
            nix-cache-${{ runner.os }}-
      - name: Verify crate2nix artifacts are fresh
        run: nix run .#nixcfg -- ci pipeline crate2nix
