---
name: CI
on:
  pull_request:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
env:
  CACHIX_NAME: gkze
permissions:
  contents: read
jobs:
  commitlint:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - &checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - &setup_nix
        uses: DeterminateSystems/determinate-nix-action@a18f73c54ca8525de051e73c31512a67f44df919 # v3.17.1
      - &cachix_write
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: ${{ env.CACHIX_NAME }}
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - &cachix_readonly
        if: github.ref != format('refs/heads/{0}', github.event.repository.default_branch)
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: ${{ env.CACHIX_NAME }}
          skipPush: true
      - &cache_nix
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          # Cache immutable tarball fetch artifacts only. Nix recreates
          # mutable SQLite metadata caches locally, and persisting them via
          # archive-based CI caches can restore malformed databases.
          path: |
            ~/.cache/nix/tarball-cache
            ~/.cache/nix/tarball-cache-v2
          key: nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'packages/**/sources.json', 'overlays/**/sources.json', 'packages/**/Cargo.nix', 'packages/**/crate-hashes.json', 'overlays/**/Cargo.nix', 'overlays/**/crate-hashes.json', 'packages/superset/bun.nix') }}
          restore-keys: |
            nix-cache-${{ runner.os }}-${{ runner.arch }}-
            nix-cache-${{ runner.os }}-
      - name: Lint commit messages
        run: |-
          case "${{ github.event_name }}" in
            pull_request)
              FROM="${{ github.event.pull_request.base.sha }}"
              TO="${{ github.event.pull_request.head.sha }}"
              ;;
            push)
              FROM="${{ github.event.before }}"
              TO="${{ github.sha }}"
              ;;
            *)
              FROM=""
              TO="${{ github.sha }}"
              ;;
          esac

          if [ -n "$FROM" ] && [ "$FROM" != "0000000000000000000000000000000000000000" ]; then
            nix run --inputs-from . nixpkgs#commitlint -- \
              --from "$FROM" \
              --to "$TO" \
              --verbose
          else
            nix run --inputs-from . nixpkgs#commitlint -- \
              --last \
              --verbose
          fi
  quality:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: format
            command: nix fmt -- --ci
          - name: editorconfig
            command: nix run --inputs-from . nixpkgs#editorconfig-checker
          - name: python
            command: uv run ruff check --config pyproject.toml . && uv run ty check .
          - name: pytest
            command: uv sync --frozen --group dev && uv run coverage run -m pytest && uv run coverage report
          - name: ghawfr-go
            command: cd ghawfr && go test ./...
          - name: crate2nix
            command: uv run python -m lib.update.ci.crate2nix
          - name: workflow-artifacts
            command: uv run nixcfg ci workflow verify-artifacts
          - name: pinact
            command: pinact run --check
          - name: actionlint
            command: nix run --inputs-from . nixpkgs#actionlint
          - name: yamllint
            command: |
              mapfile -d '' -t files < <(git ls-files -z -- '*.yml' '*.yaml')
              if [ "${#files[@]}" -gt 0 ]; then
                yamllint -c .yamllint "${files[@]}"
              fi
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - *checkout
      - *setup_nix
      - *cachix_write
      - *cachix_readonly
      - *cache_nix
      - name: Run quality gate
        env:
          QUALITY_COMMAND: ${{ matrix.command }}
        run: nix develop --command bash -lc "$QUALITY_COMMAND"
