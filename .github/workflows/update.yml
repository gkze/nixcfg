--- # !yamlfmt!:ignore
name: Update

env:
  CACHIX_NAME: gkze
  UPDATE_COMMIT_MESSAGE: "chore: update flake.lock, sources, uv.lock, and crate2nix"

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  workflow_dispatch:

concurrency:
  group: flake-update-refresh
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Phase 1: Update flake.lock
  update-lock:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - &checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - &setup_nix # Determinate Nix v3.17.1
        uses: DeterminateSystems/determinate-nix-action@a18f73c54ca8525de051e73c31512a67f44df919
        with:
          # Nix uses this token for external api.github.com flake fetches.
          # The default github.token produces HTTP 401 "Bad credentials" there.
          github-token: ${{ secrets.UPDATE_SELF_HEAL_GITHUB_TOKEN }}
          extra-conf: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
      - &cachix
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          # Push store paths incrementally as each build completes while also
          # pulling from the public zed cache.
          name: ${{ env.CACHIX_NAME }}
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: zed
          useDaemon: true
      - &cache_nix
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          # Cache immutable tarball fetch artifacts only. Nix recreates
          # mutable SQLite metadata caches locally, and persisting them via
          # archive-based CI caches can restore malformed databases.
          path: |
            ~/.cache/nix/tarball-cache
            ~/.cache/nix/tarball-cache-v2
          key: >-
            nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles(
            'flake.lock',
            'packages/**/sources.json',
            'overlays/**/sources.json',
            'packages/**/uv.lock',
            'packages/**/deno-deps.json',
            'packages/**/build.zig.zon.nix',
            'packages/**/Cargo.nix',
            'packages/**/crate-hashes.json',
            'overlays/**/Cargo.nix',
            'overlays/**/crate-hashes.json',
            'packages/superset/bun.nix',
            'packages/superset/bun.lock',
            'packages/t3code/bun.lock',
            'packages/t3code-desktop/bun.lock'
            ) }}
          restore-keys: |
            nix-cache-${{ runner.os }}-${{ runner.arch }}-
            nix-cache-${{ runner.os }}-
      - name: Verify workflow artifact contracts
        run: nix run .#nixcfg -- ci workflow verify-artifacts
      - name: Verify workflow structure contracts
        run: nix run .#nixcfg -- ci workflow verify-structure
      - name: Snapshot superset flake input
        run: >-
          nix run .#nixcfg -- ci workflow flake-input snapshot --node superset --output
          /tmp/superset-lock-before.json
      - run: nix run .#nixcfg -- ci workflow nix-flake-update
      - name: Detect superset flake input changes
        id: superset-changed
        run: >-
          nix run .#nixcfg -- ci workflow flake-input compare --node superset --before
          /tmp/superset-lock-before.json --github-output "$GITHUB_OUTPUT"
      - name: Regenerate superset bun2nix lock
        if: steps.superset-changed.outputs.changed == 'true'
        run: nix run .#superset.passthru.updateScript
      - name: Format regenerated superset bun.nix
        if: steps.superset-changed.outputs.changed == 'true'
        run: nix fmt -- packages/superset/bun.nix
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: flake-lock
          if-no-files-found: error
          path: |
            flake.lock
            packages/superset/bun.nix
            packages/superset/bun.lock

  # Phase 2: Catch lock-only Darwin input breakage immediately after flake.lock refresh
  darwin-lock-smoke:
    needs: update-lock
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - &download_flake_lock
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: flake-lock
          path: .
      - &cache_nix_arch
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          # Cache immutable tarball fetch artifacts only. Nix recreates
          # mutable SQLite metadata caches locally, and persisting them via
          # archive-based CI caches can restore malformed databases.
          path: |
            ~/.cache/nix/tarball-cache
            ~/.cache/nix/tarball-cache-v2
          key: >-
            nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles(
            'flake.lock',
            'packages/**/sources.json',
            'overlays/**/sources.json',
            'packages/**/uv.lock',
            'packages/**/deno-deps.json',
            'packages/**/build.zig.zon.nix',
            'packages/**/Cargo.nix',
            'packages/**/crate-hashes.json',
            'overlays/**/Cargo.nix',
            'overlays/**/crate-hashes.json',
            'packages/superset/bun.nix',
            'packages/superset/bun.lock',
            'packages/t3code/bun.lock',
            'packages/t3code-desktop/bun.lock'
            ) }}
          restore-keys: |
            nix-cache-${{ runner.os }}-${{ runner.arch }}-
            nix-cache-${{ runner.os }}-
      - name: Pre-fetch flake inputs
        run: nix run .#nixcfg -- ci workflow prefetch-flake-inputs
      - name: Evaluate lock-only Darwin smoke expressions
        run: nix run .#nixcfg -- ci workflow darwin eval-lock-smoke

  # Phase 3: Resolve upstream versions once (eliminates cross-platform race)
  resolve-versions:
    needs: update-lock
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - *download_flake_lock
      - *cache_nix_arch
      - name: Resolve upstream versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix run .#nixcfg -- ci pipeline versions --output pinned-versions.json
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: pinned-versions
          if-no-files-found: error
          path: pinned-versions.json

  # Phase 4: Discover package update targets once for package-sliced refresh jobs.
  discover-update-targets:
    needs:
      - update-lock
      - resolve-versions
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      targets: ${{ steps.matrix.outputs.targets }}
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - *download_flake_lock
      - *cache_nix_arch
      - name: Build update target matrix
        id: matrix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nix run .#nixcfg -- update --list --json > update-targets.json
          python3 lib/update/ci/update_target_artifacts.py matrix \
            --inventory update-targets.json \
            --output update-target-matrix.json
          {
            echo "targets<<EOF"
            cat update-target-matrix.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: update-target-matrix
          if-no-files-found: error
          path: |
            update-targets.json
            update-target-matrix.json

  # Phase 5: Compute package-specific hashes in parallel on native runners.
  compute-hashes-aarch64-darwin:
    needs:
      - update-lock
      - darwin-lock-smoke
      - resolve-versions
      - discover-update-targets
    runs-on: macos-15
    name: aarch64-darwin / ${{ matrix.target }}
    timeout-minutes: 300
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJSON(needs.discover-update-targets.outputs.targets) }}
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - *download_flake_lock
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          # Cache immutable tarball fetch artifacts only. Nix recreates
          # mutable SQLite metadata caches locally, and persisting them via
          # archive-based CI caches can restore malformed databases.
          path: |
            ~/.cache/nix/tarball-cache
            ~/.cache/nix/tarball-cache-v2
          key: nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-cache-${{ runner.os }}-${{ runner.arch }}-
            nix-cache-${{ runner.os }}-
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: pinned-versions
          path: .
      - name: Free disk space
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: nix run .#nixcfg -- ci workflow free-disk-space
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          ignore-nothing-to-cache: true
      - name: Regenerate T3 Code runtime Bun locks
        if: matrix.regenerate_runtime_locks == true
        run: nix run .#t3code-desktop.passthru.updateRuntimeLocks
      - name: Compute hashes for ${{ matrix.target }} on aarch64-darwin
        id: update-target
        continue-on-error: true
        # Run update with pinned versions to ensure all platforms use the
        # same upstream version (resolved in the resolve-versions job).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_SUBPROCESS_TIMEOUT: "14400"
          UPDATE_MAX_NIX_BUILDS: "1"
        run: >-
          nix run .#nixcfg -- update --native-only
          --pinned-versions pinned-versions.json
          "${{ matrix.target }}"
      - name: Stage target artifact
        if: always()
        env:
          ARTIFACT_PATHS_JSON: ${{ toJSON(matrix.artifact_paths_aarch64_darwin) }}
          UPDATE_OUTCOME: ${{ steps.update-target.outcome }}
        run: |
          exit_code=1
          if [ "$UPDATE_OUTCOME" = "success" ]; then
            exit_code=0
          fi
          python3 lib/update/ci/update_target_artifacts.py stage \
            --root . \
            --output update-target-artifact \
            --target "${{ matrix.target }}" \
            --platform aarch64-darwin \
            --artifact-paths-json "$ARTIFACT_PATHS_JSON" \
            --exit-code "$exit_code"
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always()
        with:
          name: update-target-aarch64-darwin-${{ matrix.artifact_slug }}
          if-no-files-found: error
          path: update-target-artifact
      - name: Fail target job if update failed
        if: steps.update-target.outcome != 'success'
        run: exit 1

  compute-hashes-x86_64-linux:
    needs:
      - update-lock
      - resolve-versions
      - discover-update-targets
    runs-on: ubuntu-24.04
    name: x86_64-linux / ${{ matrix.target }}
    timeout-minutes: 300
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJSON(needs.discover-update-targets.outputs.targets) }}
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - *download_flake_lock
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          # Cache immutable tarball fetch artifacts only. Nix recreates
          # mutable SQLite metadata caches locally, and persisting them via
          # archive-based CI caches can restore malformed databases.
          path: |
            ~/.cache/nix/tarball-cache
            ~/.cache/nix/tarball-cache-v2
          key: nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-cache-${{ runner.os }}-${{ runner.arch }}-
            nix-cache-${{ runner.os }}-
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: pinned-versions
          path: .
      - name: Free disk space
        run: nix run .#nixcfg -- ci workflow free-disk-space
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          ignore-nothing-to-cache: true
      - name: Compute hashes for ${{ matrix.target }} on x86_64-linux
        id: update-target
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_SUBPROCESS_TIMEOUT: "14400"
          UPDATE_MAX_NIX_BUILDS: "1"
        run: |
          nix run .#nixcfg -- update --native-only \
            --pinned-versions pinned-versions.json \
            "${{ matrix.target }}"
      - name: Stage target artifact
        if: always()
        env:
          ARTIFACT_PATHS_JSON: ${{ toJSON(matrix.artifact_paths_x86_64_linux) }}
          UPDATE_OUTCOME: ${{ steps.update-target.outcome }}
        run: |
          exit_code=1
          if [ "$UPDATE_OUTCOME" = "success" ]; then
            exit_code=0
          fi
          python3 lib/update/ci/update_target_artifacts.py stage \
            --root . \
            --output update-target-artifact \
            --target "${{ matrix.target }}" \
            --platform x86_64-linux \
            --artifact-paths-json "$ARTIFACT_PATHS_JSON" \
            --exit-code "$exit_code"
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always()
        with:
          name: update-target-x86_64-linux-${{ matrix.artifact_slug }}
          if-no-files-found: error
          path: update-target-artifact
      - name: Fail target job if update failed
        if: steps.update-target.outcome != 'success'
        run: exit 1

  compute-hashes-aarch64-linux:
    needs:
      - update-lock
      - resolve-versions
      - discover-update-targets
    runs-on: ubuntu-24.04-arm
    name: aarch64-linux / ${{ matrix.target }}
    timeout-minutes: 300
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJSON(needs.discover-update-targets.outputs.targets) }}
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - *download_flake_lock
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          # Cache immutable tarball fetch artifacts only. Nix recreates
          # mutable SQLite metadata caches locally, and persisting them via
          # archive-based CI caches can restore malformed databases.
          path: |
            ~/.cache/nix/tarball-cache
            ~/.cache/nix/tarball-cache-v2
          key: nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-cache-${{ runner.os }}-${{ runner.arch }}-
            nix-cache-${{ runner.os }}-
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: pinned-versions
          path: .
      - name: Free disk space
        run: nix run .#nixcfg -- ci workflow free-disk-space
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          ignore-nothing-to-cache: true
      - name: Compute hashes for ${{ matrix.target }} on aarch64-linux
        id: update-target
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_SUBPROCESS_TIMEOUT: "14400"
        run: >-
          nix run .#nixcfg -- update --native-only
          --pinned-versions pinned-versions.json
          "${{ matrix.target }}"
      - name: Stage target artifact
        if: always()
        env:
          ARTIFACT_PATHS_JSON: ${{ toJSON(matrix.artifact_paths_aarch64_linux) }}
          UPDATE_OUTCOME: ${{ steps.update-target.outcome }}
        run: |
          exit_code=1
          if [ "$UPDATE_OUTCOME" = "success" ]; then
            exit_code=0
          fi
          python3 lib/update/ci/update_target_artifacts.py stage \
            --root . \
            --output update-target-artifact \
            --target "${{ matrix.target }}" \
            --platform aarch64-linux \
            --artifact-paths-json "$ARTIFACT_PATHS_JSON" \
            --exit-code "$exit_code"
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always()
        with:
          name: update-target-aarch64-linux-${{ matrix.artifact_slug }}
          if-no-files-found: error
          path: update-target-artifact
      - name: Fail target job if update failed
        if: steps.update-target.outcome != 'success'
        run: exit 1

  aggregate-platform-updates:
    needs:
      - discover-update-targets
      - compute-hashes-aarch64-darwin
      - compute-hashes-x86_64-linux
      - compute-hashes-aarch64-linux
    if: >-
      always() && !cancelled() &&
      needs.discover-update-targets.result == 'success'
    runs-on: ubuntu-24.04
    name: aggregate / ${{ matrix.platform }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: aarch64-darwin
          - platform: x86_64-linux
          - platform: aarch64-linux
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: update-target-*
          path: update-target-artifacts
      - name: Aggregate successful package artifacts
        run: >-
          python3 lib/update/ci/update_target_artifacts.py aggregate
          --artifacts-dir update-target-artifacts
          --output "aggregated-${{ matrix.platform }}"
          --platform "${{ matrix.platform }}"
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: sources-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            aggregated-${{ matrix.platform }}/packages/**/sources.json
            aggregated-${{ matrix.platform }}/overlays/**/sources.json
            aggregated-${{ matrix.platform }}/nixcfg-update-target-status.json
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: matrix.platform == 'x86_64-linux'
        with:
          name: generated-artifacts-${{ matrix.platform }}
          if-no-files-found: ignore
          path: |
            aggregated-${{ matrix.platform }}/packages/**/uv.lock
            aggregated-${{ matrix.platform }}/packages/**/deno-deps.json
            aggregated-${{ matrix.platform }}/packages/**/build.zig.zon.nix
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: matrix.platform == 'aarch64-darwin'
        with:
          name: generated-artifacts-${{ matrix.platform }}-runtime-locks
          if-no-files-found: ignore
          path: |
            aggregated-${{ matrix.platform }}/packages/t3code/bun.lock
            aggregated-${{ matrix.platform }}/packages/t3code-desktop/bun.lock
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: update-target-status-${{ matrix.platform }}
          if-no-files-found: error
          path: aggregated-${{ matrix.platform }}/nixcfg-update-target-status.json

  # Phase 6: Merge platform-specific hashes
  merge-hashes:
    needs: aggregate-platform-updates
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - *download_flake_lock
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: sources-aarch64-darwin
          path: sources-aarch64-darwin
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: sources-x86_64-linux
          path: sources-x86_64-linux
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: sources-aarch64-linux
          path: sources-aarch64-linux
      - name: Materialize checked-in generated updater artifacts
        # These generated files are platform-independent metadata. Download one
        # canonical artifact at the repository root so checked-in lockfiles and
        # manifests are carried forward into merged-sources and the PR branch.
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        continue-on-error: true
        with:
          name: generated-artifacts-x86_64-linux
          path: packages
      - name: Materialize checked-in Darwin updater artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        continue-on-error: true
        with:
          name: generated-artifacts-aarch64-darwin-runtime-locks
          path: packages
      - *cache_nix
      - name: Merge per-package sources files
        run: |
          nix run .#nixcfg -- ci pipeline sources \
            sources-aarch64-darwin \
            sources-x86_64-linux \
            sources-aarch64-linux
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: merged-sources
          if-no-files-found: error
          path: |
            flake.lock
            packages/superset/bun.nix
            packages/superset/bun.lock
            packages/t3code/bun.lock
            packages/t3code-desktop/bun.lock
            packages/**/sources.json
            packages/**/uv.lock
            packages/**/deno-deps.json
            packages/**/build.zig.zon.nix
            overlays/**/sources.json

  # Phase 7: Refresh checked-in generated artifacts on native platforms
  crate2nix-linux:
    needs: merge-hashes
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: merged-sources
          path: .
      - *cache_nix
      - name: Refresh Linux crate2nix artifacts
        run: nix run .#nixcfg -- ci pipeline crate2nix --write
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: crate2nix-linux
          if-no-files-found: error
          path: |
            packages/codex/Cargo.nix
            packages/codex/crate-hashes.json
            overlays/goose-cli/Cargo.nix
            overlays/goose-cli/crate-hashes.json

  crate2nix-darwin:
    needs: merge-hashes
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: merged-sources
          path: .
      - *cache_nix_arch
      - name: Free disk space
        run: nix run .#nixcfg -- ci workflow free-disk-space
      - name: Pre-fetch flake inputs
        run: nix run .#nixcfg -- ci workflow prefetch-flake-inputs
      - name: Refresh Darwin crate2nix artifacts
        run: >-
          nix run .#nixcfg -- ci pipeline crate2nix --write
          --package zed-editor-nightly
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: crate2nix-darwin
          if-no-files-found: error
          path: |
            packages/zed-editor-nightly/Cargo.nix
            packages/zed-editor-nightly/crate-hashes.json

  merge-generated:
    needs:
      - merge-hashes
      - crate2nix-linux
      - crate2nix-darwin
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - *checkout
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: merged-sources
          path: .
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: crate2nix-linux
          path: .
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: crate2nix-darwin
          path: packages/zed-editor-nightly
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: merged-generated
          if-no-files-found: error
          path: |
            flake.lock
            packages/superset/bun.nix
            packages/superset/bun.lock
            packages/t3code/bun.lock
            packages/t3code-desktop/bun.lock
            packages/**/sources.json
            packages/**/uv.lock
            packages/**/deno-deps.json
            packages/**/build.zig.zon.nix
            overlays/**/sources.json
            packages/codex/Cargo.nix
            packages/codex/crate-hashes.json
            overlays/goose-cli/Cargo.nix
            overlays/goose-cli/crate-hashes.json
            packages/zed-editor-nightly/Cargo.nix
            packages/zed-editor-nightly/crate-hashes.json

  # Phase 8: Refresh sanity checks required before opening the PR
  refresh-sanity:
    needs: merge-generated
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: merged-generated
          path: .
      - *cache_nix
      - name: Check Nix formatting
        run: nix fmt -- --ci
      - name: Verify crate2nix artifacts are fresh
        run: nix run .#nixcfg -- ci pipeline crate2nix
      - name: Smoke-check update app evaluation
        run: nix run .#nixcfg -- ci workflow smoke-check-update-app
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: merged-generated-formatted
          if-no-files-found: error
          path: |
            flake.lock
            packages/superset/bun.nix
            packages/superset/bun.lock
            packages/t3code/bun.lock
            packages/t3code-desktop/bun.lock
            packages/**/sources.json
            packages/**/uv.lock
            packages/**/deno-deps.json
            packages/**/build.zig.zon.nix
            overlays/**/sources.json
            packages/codex/Cargo.nix
            packages/codex/crate-hashes.json
            overlays/goose-cli/Cargo.nix
            overlays/goose-cli/crate-hashes.json
            packages/zed-editor-nightly/Cargo.nix
            packages/zed-editor-nightly/crate-hashes.json

  # Phase 9: Create PR with updates
  create-pr:
    needs:
      - merge-generated
      - refresh-sanity
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - *setup_nix
      - *cachix
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: merged-generated-formatted
          path: .
      - *cache_nix
      - name: Generate PR body
        # yamllint disable rule:line-length
        run: |
          nix run .#nixcfg -- ci workflow generate-pr-body \
            --output /tmp/pr-body.md \
            --workflow-url \
              "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --server-url "${{ github.server_url }}" \
            --repository "${{ github.repository }}" \
            --base-ref "${{ github.base_ref || github.event.repository.default_branch }}"
        # yamllint enable rule:line-length

      - uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        id: cpr
        with:
          sign-commits: true
          branch: update_flake_lock_action
          delete-branch: true
          title: ${{ env.UPDATE_COMMIT_MESSAGE }}
          commit-message: ${{ env.UPDATE_COMMIT_MESSAGE }}
          body-path: /tmp/pr-body.md
      - name: Dispatch PR-head CI workflow
        if: >-
          steps.cpr.outputs.pull-request-number != '' &&
          steps.cpr.outputs.pull-request-operation != 'closed'
        env:
          GH_TOKEN: ${{ github.token }}
          UPDATE_BRANCH: ${{ steps.cpr.outputs.pull-request-branch }}
        run: gh workflow run ci.yml --ref "${UPDATE_BRANCH}"
