--- # !yamlfmt!:ignore
name: Periodic Flake Update

env:
  CACHIX_NAME: gkze

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: flake-update
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  # Phase 1: Update flake.lock
  update-lock:
    runs-on: ubuntu-24.04
    steps:
      - &checkout
        uses: actions/checkout@v6
      - &setup_nix
        uses: DeterminateSystems/determinate-nix-action@v3
      - &cachix
        uses: cachix/cachix-action@v16
        with:
          name: ${{ env.CACHIX_NAME }}
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - &cache_nix
        uses: actions/cache@v5
        with:
          path: ~/.cache/nix
          key: nix-cache-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-keys: nix-cache-${{ runner.os }}-
      - name: Snapshot superset flake input
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          lock = json.loads(Path("flake.lock").read_text())
          superset_locked = lock.get("nodes", {}).get("superset", {}).get("locked", {})
          Path("/tmp/superset-lock-before.json").write_text(
              json.dumps(superset_locked, sort_keys=True)
          )
          PY
      - run: nix run .#nixcfg -- ci workflow nix-flake-update
      - name: Detect superset flake input changes
        id: superset-changed
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          before = json.loads(Path("/tmp/superset-lock-before.json").read_text())
          lock = json.loads(Path("flake.lock").read_text())
          after = lock.get("nodes", {}).get("superset", {}).get("locked", {})
          changed = before != after
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"changed={'true' if changed else 'false'}\n")
          PY
      - name: Regenerate superset bun2nix lock
        if: steps.superset-changed.outputs.changed == 'true'
        run: nix run .#superset.passthru.updateScript
      - uses: actions/upload-artifact@v6
        with:
          name: flake-lock
          path: |
            flake.lock
            packages/superset/bun.nix

  # Phase 2: Resolve upstream versions once (eliminates cross-platform race)
  resolve-versions:
    needs: update-lock
    runs-on: ubuntu-24.04
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - &download_flake_lock
        uses: actions/download-artifact@v7
        with:
          name: flake-lock
          path: .
      - &cache_nix_arch
        uses: actions/cache@v5
        with:
          path: ~/.cache/nix
          key: nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-keys: nix-cache-${{ runner.os }}-${{ runner.arch }}-
      - name: Resolve upstream versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix run .#nixcfg -- ci pipeline versions --output pinned-versions.json
      - uses: actions/upload-artifact@v6
        with:
          name: pinned-versions
          if-no-files-found: error
          path: pinned-versions.json

  # Phase 3: Compute platform-specific hashes in parallel on native runners
  compute-hashes:
    needs:
      - update-lock
      - resolve-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: aarch64-darwin
          - runner: ubuntu-24.04
            platform: x86_64-linux
          - runner: ubuntu-24.04-arm
            platform: aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - uses: actions/download-artifact@v7
        with:
          name: flake-lock
          path: .
      - uses: actions/cache@v5
        with:
          path: ~/.cache/nix
          key: nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-keys: nix-cache-${{ runner.os }}-${{ runner.arch }}-
      - uses: actions/download-artifact@v7
        with:
          name: pinned-versions
          path: .
      - name: Free disk space
        if: runner.os == 'macOS'
        run: nix run .#nixcfg -- ci workflow free-disk-space
      - name: Compute hashes for ${{ matrix.platform }}
        # Run update with pinned versions to ensure all platforms use the
        # same upstream version (resolved in the resolve-versions job).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_SUBPROCESS_TIMEOUT: "14400"
        run: nix run .#nixcfg -- update --native-only --pinned-versions pinned-versions.json
      - name: Warm FOD cache for ${{ matrix.platform }}
        # Build packages with platform-specific FOD hashes so the Cachix
        # daemon pushes them.  Downstream jobs get a cache hit instead of
        # rebuilding the FOD (which is non-deterministic across runners).
        run: nix run .#nixcfg -- ci cache fod
      - uses: actions/upload-artifact@v6
        with:
          name: sources-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            packages/**/sources.json
            overlays/**/sources.json

  # Phase 4: Merge platform-specific hashes
  merge-hashes:
    needs: compute-hashes
    runs-on: ubuntu-24.04
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - *cache_nix
      - *download_flake_lock
      - uses: actions/download-artifact@v7
        with:
          name: sources-aarch64-darwin
          path: sources-aarch64-darwin
      - uses: actions/download-artifact@v7
        with:
          name: sources-x86_64-linux
          path: sources-x86_64-linux
      - uses: actions/download-artifact@v7
        with:
          name: sources-aarch64-linux
          path: sources-aarch64-linux
      - name: Merge per-package sources files
        run: |
          nix run .#nixcfg -- ci pipeline sources \
            sources-aarch64-darwin \
            sources-x86_64-linux \
            sources-aarch64-linux
      - uses: actions/upload-artifact@v6
        with:
          name: merged-sources
          path: |
            flake.lock
            packages/superset/bun.nix
            packages/**/sources.json
            overlays/**/sources.json

  # Phase 5: Quality gates
  quality-gates:
    needs: merge-hashes
    runs-on: ubuntu-24.04
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - *cache_nix
      - uses: actions/download-artifact@v7
        with:
          name: merged-sources
          path: .
      - name: Check Nix formatting
        run: nix fmt -- --ci
      - name: Run Nix flake checks
        run: nix flake check
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
      - name: Install Python dependencies
        run: uv sync --frozen --group dev
      - name: Run pytest with coverage
        run: |-
          uv run coverage run -m pytest
          uv run coverage report

  # Phase 6: Build the slowest Darwin derivations in parallel
  darwin-shared-heavy:
    needs:
      - merge-hashes
      - quality-gates
    runs-on: macos-15
    name: ${{ matrix.package }}
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        include:
          - package: zed-editor-nightly
            target: .#darwinConfigurations.argus.pkgs.zed-editor-nightly
          - package: opencode
            target: .#darwinConfigurations.argus.pkgs.opencode
          - package: opencode-desktop
            target: .#darwinConfigurations.argus.pkgs.opencode-desktop
          - package: codex
            target: .#darwinConfigurations.argus.pkgs.codex
          - package: scratch
            target: .#darwinConfigurations.argus.pkgs.scratch
          - package: czkawka
            target: .#darwinConfigurations.argus.pkgs.czkawka
          - package: gemini-cli
            target: .#darwinConfigurations.argus.pkgs.gemini-cli
          - package: element-desktop
            target: .#darwinConfigurations.argus.pkgs.element-desktop
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - uses: actions/download-artifact@v7
        with:
          name: merged-sources
          path: .
      - *cache_nix_arch
      - name: Free disk space
        run: nix run .#nixcfg -- ci workflow free-disk-space
      - run: nix run .#nixcfg -- ci workflow install-darwin-tools
      - name: Pre-fetch flake inputs
        run: nix run .#nixcfg -- ci workflow prefetch-flake-inputs
      - name: Build heavy target (${{ matrix.package }})
        run: nix build --impure ${{ matrix.target }}

  # Phase 7: Build shared Darwin derivations to populate cache
  darwin-shared:
    needs:
      - merge-hashes
      - quality-gates
    runs-on: macos-15
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - &download_merged_sources
        uses: actions/download-artifact@v7
        with:
          name: merged-sources
          path: .
      - *cache_nix_arch
      - name: Free disk space
        run: nix run .#nixcfg -- ci workflow free-disk-space
      - run: nix run .#nixcfg -- ci workflow install-darwin-tools
      - name: Pre-fetch flake inputs
        run: nix run .#nixcfg -- ci workflow prefetch-flake-inputs
      - name: Build shared Darwin closure
        run: |
          nix run .#nixcfg -- ci cache closure \
            --mode intersection \
            --exclude-ref .#darwinConfigurations.argus.pkgs.zed-editor-nightly \
            --exclude-ref .#darwinConfigurations.argus.pkgs.opencode \
            --exclude-ref .#darwinConfigurations.argus.pkgs.opencode-desktop \
            --exclude-ref .#darwinConfigurations.argus.pkgs.codex \
            --exclude-ref .#darwinConfigurations.argus.pkgs.scratch \
            --exclude-ref .#darwinConfigurations.argus.pkgs.czkawka \
            --exclude-ref .#darwinConfigurations.argus.pkgs.gemini-cli \
            --exclude-ref .#darwinConfigurations.argus.pkgs.element-desktop \
            .#darwinConfigurations.argus.system \
            .#darwinConfigurations.rocinante.system

  # Phase 8: Build Darwin configurations per host
  darwin-argus:
    needs:
      - merge-hashes
      - quality-gates
      - darwin-shared-heavy
      - darwin-shared
    runs-on: macos-15
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - *download_merged_sources
      - *cache_nix_arch
      - name: Free disk space
        run: nix run .#nixcfg -- ci workflow free-disk-space
      - run: nix run .#nixcfg -- ci workflow install-darwin-tools
      - name: Pre-fetch flake inputs
        run: nix run .#nixcfg -- ci workflow prefetch-flake-inputs
      - run: nix run .#nixcfg -- ci workflow build-darwin-config argus

  darwin-rocinante:
    needs:
      - merge-hashes
      - quality-gates
      - darwin-shared-heavy
      - darwin-shared
    runs-on: macos-15
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - *download_merged_sources
      - *cache_nix_arch
      - name: Free disk space
        run: nix run .#nixcfg -- ci workflow free-disk-space
      - run: nix run .#nixcfg -- ci workflow install-darwin-tools
      - name: Pre-fetch flake inputs
        run: nix run .#nixcfg -- ci workflow prefetch-flake-inputs
      - run: nix run .#nixcfg -- ci workflow build-darwin-config rocinante

  # Phase 9: Placeholder for future NixOS configuration builds
  linux:
    needs:
      - merge-hashes
      - quality-gates
    runs-on: ubuntu-24.04
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - *download_merged_sources
      - *cache_nix_arch
      - name: Smoke-check update app evaluation
        run: nix run .#nixcfg -- ci workflow smoke-check-update-app
      - run: nix run .#nixcfg -- ci workflow list-update-targets

  # Phase 10: Create PR with updates
  create-pr:
    needs:
      - merge-hashes
      - quality-gates
      - darwin-shared-heavy
      - darwin-shared
      - darwin-argus
      - darwin-rocinante
      - linux
    if: >-
      needs.merge-hashes.result == 'success' &&
      needs.quality-gates.result == 'success' &&
      needs.darwin-shared-heavy.result == 'success' &&
      needs.darwin-shared.result == 'success' &&
      needs.darwin-argus.result == 'success' &&
      needs.darwin-rocinante.result == 'success' &&
      needs.linux.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - *cache_nix
      - *download_merged_sources
      - name: Generate PR body
        run: |
          nix run .#nixcfg -- ci workflow generate-pr-body \
            --output /tmp/pr-body.md \
            --workflow-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --server-url "${{ github.server_url }}" \
            --repository "${{ github.repository }}" \
            --base-ref "${{ github.base_ref || github.event.repository.default_branch }}"

      - uses: peter-evans/create-pull-request@v8
        id: cpr
        with:
          sign-commits: true
          branch: update_flake_lock_action
          delete-branch: true
          title: "nix: Update flake.lock and sources"
          commit-message: "nix: Update flake.lock and sources"
          body-path: /tmp/pr-body.md
