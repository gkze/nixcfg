--- # !yamlfmt!:ignore
name: Periodic Flake Update

env:
  CACHIX_NAME: gkze
  UPDATE_COMMIT_MESSAGE: "chore: update flake.lock, sources, uv.lock, and crate2nix"

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  workflow_dispatch:

concurrency:
  group: flake-update
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Phase 1: Update flake.lock
  update-lock:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - &checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - &setup_nix
        uses: DeterminateSystems/determinate-nix-action@a18f73c54ca8525de051e73c31512a67f44df919 # v3.17.1
      - &cachix
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: ${{ env.CACHIX_NAME }}
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - &cache_nix
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          # Cache immutable tarball fetch artifacts only. Nix recreates
          # mutable SQLite metadata caches locally, and persisting them via
          # archive-based CI caches can restore malformed databases.
          path: |
            ~/.cache/nix/tarball-cache
            ~/.cache/nix/tarball-cache-v2
          key: nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'packages/**/sources.json', 'overlays/**/sources.json', 'packages/**/uv.lock', 'packages/**/Cargo.nix', 'packages/**/crate-hashes.json', 'overlays/**/Cargo.nix', 'overlays/**/crate-hashes.json', 'packages/superset/bun.nix', 'packages/superset/bun.lock') }}
          restore-keys: |
            nix-cache-${{ runner.os }}-${{ runner.arch }}-
            nix-cache-${{ runner.os }}-
      - name: Verify workflow artifact contracts
        run: nix run .#nixcfg -- ci workflow verify-artifacts
      - name: Snapshot superset flake input
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          lock = json.loads(Path("flake.lock").read_text())
          superset_locked = lock.get("nodes", {}).get("superset", {}).get("locked", {})
          Path("/tmp/superset-lock-before.json").write_text(
              json.dumps(superset_locked, sort_keys=True)
          )
          PY
      - run: nix run .#nixcfg -- ci workflow nix-flake-update
      - name: Detect superset flake input changes
        id: superset-changed
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          before = json.loads(Path("/tmp/superset-lock-before.json").read_text())
          lock = json.loads(Path("flake.lock").read_text())
          after = lock.get("nodes", {}).get("superset", {}).get("locked", {})
          changed = before != after
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"changed={'true' if changed else 'false'}\n")
          PY
      - name: Regenerate superset bun2nix lock
        if: steps.superset-changed.outputs.changed == 'true'
        run: nix run .#superset.passthru.updateScript
      - name: Format regenerated superset bun.nix
        if: steps.superset-changed.outputs.changed == 'true'
        run: nix fmt -- packages/superset/bun.nix
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: flake-lock
          if-no-files-found: error
          path: |
            flake.lock
            packages/superset/bun.nix
            packages/superset/bun.lock

  # Phase 2: Resolve upstream versions once (eliminates cross-platform race)
  resolve-versions:
    needs: update-lock
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - &download_flake_lock
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: flake-lock
          path: .
      - &cache_nix_arch
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          # Cache immutable tarball fetch artifacts only. Nix recreates
          # mutable SQLite metadata caches locally, and persisting them via
          # archive-based CI caches can restore malformed databases.
          path: |
            ~/.cache/nix/tarball-cache
            ~/.cache/nix/tarball-cache-v2
          key: nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'packages/**/sources.json', 'overlays/**/sources.json', 'packages/**/uv.lock', 'packages/**/Cargo.nix', 'packages/**/crate-hashes.json', 'overlays/**/Cargo.nix', 'overlays/**/crate-hashes.json', 'packages/superset/bun.nix', 'packages/superset/bun.lock') }}
          restore-keys: |
            nix-cache-${{ runner.os }}-${{ runner.arch }}-
            nix-cache-${{ runner.os }}-
      - name: Resolve upstream versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix run .#nixcfg -- ci pipeline versions --output pinned-versions.json
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: pinned-versions
          if-no-files-found: error
          path: pinned-versions.json

  # Phase 3: Compute platform-specific hashes in parallel on native runners
  compute-hashes:
    needs:
      - update-lock
      - resolve-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: aarch64-darwin
          - runner: ubuntu-24.04
            platform: x86_64-linux
          - runner: ubuntu-24.04-arm
            platform: aarch64-linux
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 300
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: flake-lock
          path: .
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          # Cache immutable tarball fetch artifacts only. Nix recreates
          # mutable SQLite metadata caches locally, and persisting them via
          # archive-based CI caches can restore malformed databases.
          path: |
            ~/.cache/nix/tarball-cache
            ~/.cache/nix/tarball-cache-v2
          key: nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-cache-${{ runner.os }}-${{ runner.arch }}-
            nix-cache-${{ runner.os }}-
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: pinned-versions
          path: .
      - name: Free disk space
        if: runner.os == 'macOS'
        run: nix run .#nixcfg -- ci workflow free-disk-space
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - name: Compute hashes for ${{ matrix.platform }}
        # Run update with pinned versions to ensure all platforms use the
        # same upstream version (resolved in the resolve-versions job).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_SUBPROCESS_TIMEOUT: "14400"
        run: nix run .#nixcfg -- update --native-only --pinned-versions pinned-versions.json
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: sources-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            packages/**/sources.json
            overlays/**/sources.json
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: matrix.platform == 'x86_64-linux'
        with:
          name: uv-locks-${{ matrix.platform }}
          if-no-files-found: error
          path: packages/**/uv.lock

  # Phase 4: Merge platform-specific hashes
  merge-hashes:
    needs: compute-hashes
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - *download_flake_lock
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: sources-aarch64-darwin
          path: sources-aarch64-darwin
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: sources-x86_64-linux
          path: sources-x86_64-linux
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: sources-aarch64-linux
          path: sources-aarch64-linux
      - name: Materialize checked-in uv.lock artifacts
        # uv.lock is platform-independent generated metadata. Download one
        # canonical artifact at the repository root so the checked-in lockfiles
        # are carried forward into merged-sources and the PR branch.
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: uv-locks-x86_64-linux
          path: packages
      - *cache_nix
      - name: Merge per-package sources files
        run: |
          nix run .#nixcfg -- ci pipeline sources \
            sources-aarch64-darwin \
            sources-x86_64-linux \
            sources-aarch64-linux
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: merged-sources
          if-no-files-found: error
          path: |
            flake.lock
            packages/superset/bun.nix
            packages/superset/bun.lock
            packages/**/sources.json
            packages/**/uv.lock
            overlays/**/sources.json

  # Phase 5: Refresh checked-in generated artifacts on native platforms
  crate2nix-linux:
    needs: merge-hashes
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: merged-sources
          path: .
      - *cache_nix
      - name: Refresh Linux crate2nix artifacts
        run: nix run .#nixcfg -- ci pipeline crate2nix --write
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: crate2nix-linux
          if-no-files-found: error
          path: |
            packages/codex/Cargo.nix
            packages/codex/crate-hashes.json
            overlays/goose-cli/Cargo.nix
            overlays/goose-cli/crate-hashes.json

  crate2nix-darwin:
    needs: merge-hashes
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: merged-sources
          path: .
      - *cache_nix_arch
      - name: Free disk space
        run: nix run .#nixcfg -- ci workflow free-disk-space
      - run: nix run .#nixcfg -- ci workflow install-darwin-tools
      - name: Pre-fetch flake inputs
        run: nix run .#nixcfg -- ci workflow prefetch-flake-inputs
      - name: Refresh Darwin crate2nix artifacts
        run: >-
          nix run .#nixcfg -- ci pipeline crate2nix --write
          --package zed-editor-nightly
          --package opencode-desktop
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: crate2nix-darwin
          if-no-files-found: error
          path: |
            packages/zed-editor-nightly/Cargo.nix
            packages/zed-editor-nightly/crate-hashes.json
            packages/opencode-desktop/Cargo.nix
            packages/opencode-desktop/crate-hashes.json

  merge-generated:
    needs:
      - merge-hashes
      - crate2nix-linux
      - crate2nix-darwin
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - *checkout
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: merged-sources
          path: .
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: crate2nix-linux
          path: .
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: crate2nix-darwin
          path: packages
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: merged-generated
          if-no-files-found: error
          path: |
            flake.lock
            packages/superset/bun.nix
            packages/superset/bun.lock
            packages/**/sources.json
            packages/**/uv.lock
            overlays/**/sources.json
            packages/codex/Cargo.nix
            packages/codex/crate-hashes.json
            overlays/goose-cli/Cargo.nix
            overlays/goose-cli/crate-hashes.json
            packages/zed-editor-nightly/Cargo.nix
            packages/zed-editor-nightly/crate-hashes.json
            packages/opencode-desktop/Cargo.nix
            packages/opencode-desktop/crate-hashes.json

  # Phase 6: Warm FOD cache from the fully materialized update tree
  warm-fod-cache:
    needs: merge-generated
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: aarch64-darwin
          - runner: ubuntu-24.04
            platform: x86_64-linux
          - runner: ubuntu-24.04-arm
            platform: aarch64-linux
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: merged-generated
          path: .
      - *cache_nix_arch
      - name: Free disk space
        if: runner.os == 'macOS'
        run: nix run .#nixcfg -- ci workflow free-disk-space
      - name: Warm dependency cache for ${{ matrix.platform }}
        # Build platform-specific dependency closures only after all checked-in
        # generated artifacts have been materialized. This includes classic
        # FODs plus deterministic Deno passthru closures (e.g. linear-cli).
        # Downstream jobs then evaluate one consistent tree instead of mixing
        # fresh sources.json updates with stale Cargo.nix state.
        run: nix run .#nixcfg -- ci cache fod

  # Phase 7: Quality gates
  quality-gates:
    needs: merge-generated
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: merged-generated
          path: .
      - *cache_nix
      - name: Check Nix formatting
        run: nix fmt -- --ci
      - name: Run core Nix checks
        run: |
          nix build .#checks.x86_64-linux.editorconfig
          nix build .#checks.x86_64-linux.css
          nix build .#checks.x86_64-linux.python
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - name: Install Python dependencies
        run: uv sync --frozen --group dev
      - name: Verify crate2nix artifacts are fresh
        run: nix run .#nixcfg -- ci pipeline crate2nix
      - name: Run pytest with coverage
        run: |-
          uv run coverage run -m pytest
          uv run coverage report

  # Phase 8: Build the slowest Darwin derivations in parallel
  darwin-shared-heavy:
    needs:
      - merge-generated
      - warm-fod-cache
      - quality-gates
    runs-on: macos-15
    name: ${{ matrix.package }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        include:
          - package: zed-editor-nightly
            target: .#pkgs.aarch64-darwin.zed-editor-nightly
          - package: goose-cli
            target: .#pkgs.aarch64-darwin.goose-cli
          - package: superset
            target: .#pkgs.aarch64-darwin.superset
          - package: opencode
            target: .#pkgs.aarch64-darwin.opencode
          - package: opencode-desktop
            target: .#pkgs.aarch64-darwin.opencode-desktop
          - package: codex
            target: .#pkgs.aarch64-darwin.codex
          - package: scratch
            target: .#pkgs.aarch64-darwin.scratch
          - package: czkawka
            target: .#pkgs.aarch64-darwin.czkawka
          - package: gemini-cli
            target: .#pkgs.aarch64-darwin.gemini-cli
          - package: element-desktop
            target: .#pkgs.aarch64-darwin.element-desktop
          - package: linear-cli
            target: .#pkgs.aarch64-darwin.linear-cli
          - package: lumen
            target: .#pkgs.aarch64-darwin.lumen
          - package: mountpoint-s3
            target: .#pkgs.aarch64-darwin.mountpoint-s3
          - package: mux
            target: .#pkgs.aarch64-darwin.mux
          - package: neovide
            target: .#pkgs.aarch64-darwin.neovide
          - package: rust-analyzer-unwrapped
            target: .#pkgs.aarch64-darwin.rust-analyzer-unwrapped
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: merged-generated
          path: .
      - *cache_nix_arch
      - name: Free disk space
        run: nix run .#nixcfg -- ci workflow free-disk-space
      - run: nix run .#nixcfg -- ci workflow install-darwin-tools
      - name: Pre-fetch flake inputs
        run: nix run .#nixcfg -- ci workflow prefetch-flake-inputs
      - name: Build heavy target (${{ matrix.package }})
        run: nix build --impure ${{ matrix.target }}

  # Phase 9: Build shared Darwin derivations to populate cache
  darwin-shared:
    needs:
      - merge-generated
      - warm-fod-cache
      - quality-gates
    runs-on: macos-15
    timeout-minutes: 180
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - &download_merged_sources
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: merged-generated
          path: .
      - *cache_nix_arch
      - name: Free disk space
        run: nix run .#nixcfg -- ci workflow free-disk-space
      - run: nix run .#nixcfg -- ci workflow install-darwin-tools
      - name: Pre-fetch flake inputs
        run: nix run .#nixcfg -- ci workflow prefetch-flake-inputs
      - name: Build shared Darwin closure
        run: |
          nix run .#nixcfg -- ci cache closure \
            --mode intersection \
            --exclude-ref .#pkgs.aarch64-darwin.zed-editor-nightly \
            --exclude-ref .#pkgs.aarch64-darwin.goose-cli \
            --exclude-ref .#pkgs.aarch64-darwin.superset \
            --exclude-ref .#pkgs.aarch64-darwin.opencode \
            --exclude-ref .#pkgs.aarch64-darwin.opencode-desktop \
            --exclude-ref .#pkgs.aarch64-darwin.codex \
            --exclude-ref .#pkgs.aarch64-darwin.scratch \
            --exclude-ref .#pkgs.aarch64-darwin.czkawka \
            --exclude-ref .#pkgs.aarch64-darwin.gemini-cli \
            --exclude-ref .#pkgs.aarch64-darwin.element-desktop \
            --exclude-ref .#pkgs.aarch64-darwin.linear-cli \
            --exclude-ref .#pkgs.aarch64-darwin.lumen \
            --exclude-ref .#pkgs.aarch64-darwin.mountpoint-s3 \
            --exclude-ref .#pkgs.aarch64-darwin.mux \
            --exclude-ref .#pkgs.aarch64-darwin.neovide \
            --exclude-ref .#pkgs.aarch64-darwin.rust-analyzer-unwrapped \
            .#darwinConfigurations.argus.system \
            .#darwinConfigurations.rocinante.system

  # Phase 10: Build Darwin configurations per host
  darwin-argus:
    needs:
      - merge-generated
      - quality-gates
      - darwin-shared-heavy
      - darwin-shared
    runs-on: macos-15
    timeout-minutes: 240
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - *download_merged_sources
      - *cache_nix_arch
      - name: Free disk space
        run: nix run .#nixcfg -- ci workflow free-disk-space
      - run: nix run .#nixcfg -- ci workflow install-darwin-tools
      - name: Pre-fetch flake inputs
        run: nix run .#nixcfg -- ci workflow prefetch-flake-inputs
      - run: nix run .#nixcfg -- ci workflow build-darwin-config argus

  darwin-rocinante:
    needs:
      - merge-generated
      - quality-gates
      - darwin-shared-heavy
      - darwin-shared
    runs-on: macos-15
    timeout-minutes: 240
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - *download_merged_sources
      - *cache_nix_arch
      - name: Free disk space
        run: nix run .#nixcfg -- ci workflow free-disk-space
      - run: nix run .#nixcfg -- ci workflow install-darwin-tools
      - name: Pre-fetch flake inputs
        run: nix run .#nixcfg -- ci workflow prefetch-flake-inputs
      - run: nix run .#nixcfg -- ci workflow build-darwin-config rocinante

  # Phase 11: Placeholder for future NixOS configuration builds
  linux:
    needs:
      - merge-generated
      - warm-fod-cache
      - quality-gates
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - *checkout
      - *setup_nix
      - *cachix
      - *download_merged_sources
      - *cache_nix_arch
      - name: Smoke-check update app evaluation
        run: nix run .#nixcfg -- ci workflow smoke-check-update-app
      - run: nix run .#nixcfg -- ci workflow list-update-targets

  # Phase 12: Create PR with updates
  create-pr:
    needs:
      - merge-generated
      - quality-gates
      - darwin-shared-heavy
      - darwin-shared
      - darwin-argus
      - darwin-rocinante
      - linux
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - *setup_nix
      - *cachix
      - *download_merged_sources
      - *cache_nix
      - name: Generate PR body
        run: |
          nix run .#nixcfg -- ci workflow generate-pr-body \
            --output /tmp/pr-body.md \
            --workflow-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --server-url "${{ github.server_url }}" \
            --repository "${{ github.repository }}" \
            --base-ref "${{ github.base_ref || github.event.repository.default_branch }}"

      - uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        id: cpr
        with:
          sign-commits: true
          branch: update_flake_lock_action
          delete-branch: true
