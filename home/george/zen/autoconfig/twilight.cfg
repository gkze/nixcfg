// Managed by nixcfg nixcfg.zen.

try {
  const ObserverService = Components.classes["@mozilla.org/observer-service;1"].getService(
    Components.interfaces.nsIObserverService,
  );

  const COMMON_DIALOG_URI = "chrome://global/content/commonDialog.xhtml";
  const PRIMARY_BUTTON_SELECTOR = 'button:is([dlgtype="accept"], [label^="Quit "])';
  const PRIMARY_PART = "catppuccin-primary-button";

  function report(error) {
    Components.utils.reportError(error);
  }

  function addPartToken(element, token) {
    const parts = new Set((element.getAttribute("part") || "").split(/\s+/).filter(Boolean));
    if (!parts.has(token)) {
      parts.add(token);
      element.setAttribute("part", Array.from(parts).join(" "));
    }
  }

  function patchPrimaryButton(primaryButton) {
    primaryButton.removeAttribute("default");
    primaryButton.setAttribute("data-catppuccin-primary-button", "true");
    addPartToken(primaryButton, PRIMARY_PART);
  }

  function watchPrimaryButton(primaryButton) {
    if (primaryButton.getAttribute("data-catppuccin-primary-button-watched") === "true") {
      return;
    }

    primaryButton.setAttribute("data-catppuccin-primary-button-watched", "true");
    const observer = new primaryButton.ownerGlobal.MutationObserver(() => {
      patchPrimaryButton(primaryButton);
    });
    observer.observe(primaryButton, {
      attributeFilter: ["default", "part"],
      attributes: true,
    });
  }

  function patchCommonDialog(document) {
    try {
      if (
        !document ||
        !document.documentURI ||
        !document.documentURI.startsWith(COMMON_DIALOG_URI)
      ) {
        return true;
      }

      const dialog = document.getElementById("commonDialog");
      const shadowRoot = dialog && dialog.shadowRoot;
      if (!shadowRoot) {
        return false;
      }

      const primaryButtons = shadowRoot.querySelectorAll(PRIMARY_BUTTON_SELECTOR);
      if (!primaryButtons.length) {
        return false;
      }

      for (const primaryButton of primaryButtons) {
        patchPrimaryButton(primaryButton);
        watchPrimaryButton(primaryButton);
      }
      return true;
    } catch (error) {
      report(error);
      return true;
    }
  }

  function schedulePatch(document) {
    try {
      let attempts = 0;
      const maxAttempts = 80;
      const tick = () => {
        attempts += 1;
        const done = patchCommonDialog(document);
        if (!done && attempts < maxAttempts) {
          document.defaultView.setTimeout(tick, 50);
        }
      };
      document.defaultView.setTimeout(tick, 0);
    } catch (error) {
      report(error);
    }
  }

  const observer = {
    observe(subject) {
      try {
        if (!subject || typeof subject.addEventListener !== "function") {
          return;
        }
        subject.addEventListener("DOMContentLoaded", this, { once: true });
      } catch (error) {
        report(error);
      }
    },

    handleEvent(event) {
      try {
        const document = event.originalTarget;
        if (!document || !document.documentURI) {
          return;
        }
        if (!document.documentURI.startsWith(COMMON_DIALOG_URI)) {
          return;
        }
        schedulePatch(document);
      } catch (error) {
        report(error);
      }
    },
  };

  ObserverService.addObserver(observer, "chrome-document-global-created");
} catch (error) {
  Components.utils.reportError(error);
}
