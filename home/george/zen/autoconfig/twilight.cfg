// Managed by nixcfg nixcfg.zen.

try {
  const STYLE_ID = "nixcfg-catppuccin-quit-dialog-accept-style";
  const ACCEPT_SELECTOR = 'button[dlgtype="accept"]';
  const COMMON_DIALOG_URI = "chrome://global/content/commonDialog.xhtml";
  const QUIT_DIALOG_ACCEPT_STYLE = String.raw`
button[dlgtype="accept"] {
  appearance: none !important;
  -moz-appearance: none !important;
  -moz-default-appearance: none !important;
  background: var(--catppuccin-quit-dialog-primary-bg, #8caaee) !important;
  background-color: var(--catppuccin-quit-dialog-primary-bg, #8caaee) !important;
  color: var(--catppuccin-quit-dialog-primary-fg, #232634) !important;
  border: 1px solid var(--catppuccin-quit-dialog-primary-bg, #8caaee) !important;
  border-radius: 10px !important;
  box-shadow: none !important;
  text-shadow: none !important;
}

button[dlgtype="accept"]:hover {
  background: var(--catppuccin-quit-dialog-primary-bg-hover, rgb(163, 186, 241)) !important;
  background-color: var(--catppuccin-quit-dialog-primary-bg-hover, rgb(163, 186, 241)) !important;
  color: var(--catppuccin-quit-dialog-primary-fg, #232634) !important;
  border-color: var(--catppuccin-quit-dialog-primary-bg-hover, rgb(163, 186, 241)) !important;
}

button[dlgtype="accept"]:hover:active {
  background: var(--catppuccin-quit-dialog-primary-bg-active, rgb(140, 145, 238)) !important;
  background-color: var(--catppuccin-quit-dialog-primary-bg-active, rgb(140, 145, 238)) !important;
  color: var(--catppuccin-quit-dialog-primary-fg, #232634) !important;
  border-color: var(--catppuccin-quit-dialog-primary-bg-active, rgb(140, 145, 238)) !important;
}

button[dlgtype="accept"] .button-box {
  background: transparent !important;
}

button[dlgtype="accept"],
button[dlgtype="accept"] .button-text,
button[dlgtype="accept"]:hover .button-text,
button[dlgtype="accept"]:hover:active .button-text,
button[dlgtype="accept"]:where([default="true"]:not(:-moz-window-inactive)),
button[dlgtype="accept"]:where([default="true"]:not(:-moz-window-inactive)) .button-text {
  color: var(--catppuccin-quit-dialog-primary-fg, #232634) !important;
}
`;

  function report(error) {
    Components.utils.reportError(error);
  }

  function patchAcceptButton(acceptButton) {
    try {
      acceptButton.style.setProperty("appearance", "none", "important");
      acceptButton.style.setProperty("-moz-appearance", "none", "important");
      acceptButton.style.setProperty(
        "-moz-default-appearance",
        "none",
        "important",
      );
      // Keep only the native appearance reset inline. Let the injected
      // shadow-root stylesheet own base/hover/active colors so the button can
      // brighten correctly on hover.
      acceptButton.style.removeProperty("background");
      acceptButton.style.removeProperty("background-color");
      acceptButton.style.removeProperty("color");
      acceptButton.style.removeProperty("border");
      acceptButton.style.setProperty("border-radius", "10px", "important");
      acceptButton.style.setProperty("box-shadow", "none", "important");
      acceptButton.style.setProperty("text-shadow", "none", "important");

      const buttonText = acceptButton.querySelector(".button-text");
      if (buttonText) {
        buttonText.style.removeProperty("color");
      }
    } catch (error) {
      report(error);
    }
  }

  function injectQuitDialogAcceptStyle(document) {
    try {
      if (
        !document ||
        !document.documentURI ||
        !document.documentURI.startsWith(COMMON_DIALOG_URI)
      ) {
        return true;
      }

      const dialog = document.getElementById("commonDialog");
      const shadowRoot = dialog && dialog.shadowRoot;
      if (!shadowRoot) {
        return false;
      }

      let style = shadowRoot.getElementById(STYLE_ID);
      if (!style) {
        style = document.createElementNS("http://www.w3.org/1999/xhtml", "style");
        style.id = STYLE_ID;
        style.textContent = QUIT_DIALOG_ACCEPT_STYLE;
        shadowRoot.appendChild(style);
      }

      const acceptButton = shadowRoot.querySelector(ACCEPT_SELECTOR);
      if (!acceptButton) {
        return false;
      }

      patchAcceptButton(acceptButton);
      return true;
    } catch (error) {
      report(error);
      return true;
    }
  }

  function schedulePatch(document) {
    try {
      let attempts = 0;
      const maxAttempts = 80;
      const tick = () => {
        attempts += 1;
        const done = injectQuitDialogAcceptStyle(document);
        if (!done && attempts < maxAttempts) {
          document.defaultView.setTimeout(tick, 50);
        }
      };
      document.defaultView.setTimeout(tick, 0);
    } catch (error) {
      report(error);
    }
  }

  const observer = {
    observe(subject) {
      try {
        if (!subject || typeof subject.addEventListener !== "function") {
          return;
        }
        subject.addEventListener("DOMContentLoaded", this, { once: true });
      } catch (error) {
        report(error);
      }
    },

    handleEvent(event) {
      try {
        const document = event.originalTarget;
        if (!document || !document.documentURI) {
          return;
        }
        if (!document.documentURI.startsWith(COMMON_DIALOG_URI)) {
          return;
        }
        schedulePatch(document);
      } catch (error) {
        report(error);
      }
    },
  };

  Services.obs.addObserver(observer, "chrome-document-global-created");
} catch (error) {
  Components.utils.reportError(error);
}
