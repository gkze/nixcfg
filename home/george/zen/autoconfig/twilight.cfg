// Managed by nixcfg nixcfg.zen.

try {
  const ObserverService = Components.classes["@mozilla.org/observer-service;1"].getService(
    Components.interfaces.nsIObserverService,
  );

  const CSS_PATH_SEGMENTS = [".config", "zen", "quit-dialog-primary.css"];
  const COMMON_DIALOG_URI = "chrome://global/content/commonDialog.xhtml";
  const PRIMARY_BUTTON_SELECTOR =
    'button:is([dlgtype="accept"], [default="true"], [label^="Quit "])';
  const PRIMARY_PART = "catppuccin-primary-button";
  const PATCH_MAX_ATTEMPTS = 80;
  const PATCH_RETRY_MS = 50;
  const STYLE_ID = "nixcfg-catppuccin-quit-dialog-accept-style";
  let cachedPrimaryButtonStyle = null;

  function report(error) {
    Components.utils.reportError(error);
  }

  function readPrimaryButtonStyle() {
    if (cachedPrimaryButtonStyle !== null) {
      return cachedPrimaryButtonStyle;
    }

    const DirectoryService = Components.classes["@mozilla.org/file/directory_service;1"].getService(
      Components.interfaces.nsIProperties,
    );
    const cssFile = DirectoryService.get("Home", Components.interfaces.nsIFile);
    for (const segment of CSS_PATH_SEGMENTS) {
      cssFile.append(segment);
    }

    const inputStream = Components.classes[
      "@mozilla.org/network/file-input-stream;1"
    ].createInstance(Components.interfaces.nsIFileInputStream);
    const converter = Components.classes[
      "@mozilla.org/intl/converter-input-stream;1"
    ].createInstance(Components.interfaces.nsIConverterInputStream);

    try {
      inputStream.init(cssFile, 0x01, 0, 0);
      converter.init(inputStream, "UTF-8", 0, 0);

      const chunks = [];
      const chunk = {};
      while (converter.readString(0xffffffff, chunk) !== 0) {
        chunks.push(chunk.value);
      }
      cachedPrimaryButtonStyle = chunks.join("");
      return cachedPrimaryButtonStyle;
    } finally {
      try {
        converter.close();
      } catch (error) {
        report(error);
      }
      try {
        inputStream.close();
      } catch (error) {
        report(error);
      }
    }
  }

  function addPartToken(element, token) {
    const parts = new Set((element.getAttribute("part") || "").split(/\s+/).filter(Boolean));
    if (!parts.has(token)) {
      parts.add(token);
      element.setAttribute("part", Array.from(parts).join(" "));
    }
  }

  function patchPrimaryButton(primaryButton) {
    primaryButton.removeAttribute("default");
    primaryButton.setAttribute("data-catppuccin-primary-button", "true");
    primaryButton.setAttribute("data-nixcfg-catppuccin-patched", "true");
    addPartToken(primaryButton, PRIMARY_PART);
  }

  function watchPrimaryButton(primaryButton) {
    if (primaryButton.getAttribute("data-catppuccin-primary-button-watched") === "true") {
      return;
    }

    primaryButton.setAttribute("data-catppuccin-primary-button-watched", "true");
    const observer = new primaryButton.ownerGlobal.MutationObserver(() => {
      patchPrimaryButton(primaryButton);
    });
    observer.observe(primaryButton, {
      attributeFilter: ["default", "part"],
      attributes: true,
    });
  }

  function patchCommonDialog(document) {
    try {
      if (
        !document ||
        !document.documentURI ||
        !document.documentURI.startsWith(COMMON_DIALOG_URI)
      ) {
        return true;
      }

      const dialog = document.getElementById("commonDialog");
      const shadowRoot = dialog && dialog.shadowRoot;
      if (!shadowRoot) {
        return false;
      }

      let style = shadowRoot.getElementById(STYLE_ID);
      if (!style) {
        style = document.createElementNS("http://www.w3.org/1999/xhtml", "style");
        style.id = STYLE_ID;
        style.textContent = readPrimaryButtonStyle();
        shadowRoot.appendChild(style);
      }

      const primaryButtons = shadowRoot.querySelectorAll(PRIMARY_BUTTON_SELECTOR);
      if (!primaryButtons.length) {
        return false;
      }

      for (const primaryButton of primaryButtons) {
        patchPrimaryButton(primaryButton);
        watchPrimaryButton(primaryButton);
      }
      return true;
    } catch (error) {
      report(error);
      return true;
    }
  }

  function schedulePatch(document) {
    try {
      let attempts = 0;
      const tick = () => {
        attempts += 1;
        const done = patchCommonDialog(document);
        if (!done && attempts < PATCH_MAX_ATTEMPTS) {
          document.defaultView.setTimeout(tick, PATCH_RETRY_MS);
        }
      };
      document.defaultView.setTimeout(tick, 0);
    } catch (error) {
      report(error);
    }
  }

  const observer = {
    observe(subject) {
      try {
        if (!subject || typeof subject.addEventListener !== "function") {
          return;
        }
        subject.addEventListener("DOMContentLoaded", this, { once: true });
      } catch (error) {
        report(error);
      }
    },

    handleEvent(event) {
      try {
        const document = event.originalTarget;
        if (!document || !document.documentURI) {
          return;
        }
        if (!document.documentURI.startsWith(COMMON_DIALOG_URI)) {
          return;
        }
        schedulePatch(document);
      } catch (error) {
        report(error);
      }
    },
  };

  ObserverService.addObserver(observer, "chrome-document-global-created");
} catch (error) {
  Components.utils.reportError(error);
}
